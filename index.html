<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskFlow - Integrated task and time-block scheduling" />
  <meta name="theme-color" content="#0f0f1a" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*; connect-src 'self' https://* http://localhost:* ws: wss:; frame-src 'self' https://www.google.com/recaptcha/;" />
  <script>
    (function() {
      // 1. Theme initialization
      const savedTheme = localStorage.getItem('theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.classList.add(savedTheme || systemTheme);

      // 2. Suppress common browser extension noise (e.g. Dashlane, Grammarly)
      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && 
           (args[0].includes('Could not establish connection') || 
            args[0].includes('chrome-extension://'))) {
          return;
        }
        originalConsoleError.apply(console, args);
      };

      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && event.reason.message && 
           (event.reason.message.includes('Could not establish connection') || 
            event.reason.message.includes('Receiving end does not exist'))) {
          event.preventDefault();
        }
      });
    })();
  </script>
  <title>TaskFlow</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
